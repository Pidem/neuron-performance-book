title: "From Data Scientist to Performance Engineer"
author: <a href="https://www.pierredemalliard.com">Pierre de Malliard</a>
copyright: "2026"
logo: assets/logo.png

execute:
  execute_notebooks: "off"  # pre-executed notebooks committed with outputs

repository:
  url: https://github.com/Pidem/neuron-performance-book
  branch: main

launch_buttons:
  notebook_interface: "classic"
  thebe: true

html:
  use_issues_button: true
  use_repository_button: true
  use_edit_page_button: true
  home_page_in_navbar: false
  extra_footer: |
    <p>By <a href="https://www.pierredemalliard.com">Pierre de Malliard</a></p>

sphinx:
  extra_extensions:
    - sphinx_proof
  config:
    html_theme_options:
      navigation_with_keys: true
    mathjax3_config:
      tex:
        macros:
          "N": "\\mathbb{N}"
          "floor": ["\\lfloor#1\\rfloor", 1]
