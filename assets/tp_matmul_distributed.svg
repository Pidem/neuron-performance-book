<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 530" font-family="system-ui, -apple-system, sans-serif">
  <rect width="750" height="530" fill="#fafafa"/>
  
  <!-- Title -->
  <text x="375" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Tensor Parallelism: Y = X × W, sharded across P=3 chips</text>
  
  <!-- Top row: the matmul visualized -->
  <g transform="translate(75, 50)">
    
    <!-- Input X [B, D]: B rows (short), D columns (wide) -->
    <rect x="0" y="60" width="120" height="40" fill="#ddd" stroke="#333" stroke-width="1.5"/>
    <text x="60" y="84" text-anchor="middle" font-size="10" fill="#333">X</text>
    <text x="-10" y="84" text-anchor="middle" font-size="9" fill="#666">B</text>
    <text x="60" y="55" text-anchor="middle" font-size="9" fill="#666">D</text>
    <text x="60" y="115" text-anchor="middle" font-size="9" fill="#666">[B × D]</text>
    
    <!-- × symbol -->
    <text x="148" y="84" text-anchor="middle" font-size="16" fill="#333">×</text>
    
    <!-- Weight W [D, D] sharded into 3: D rows (tall), D columns (wide) -->
    <rect x="190" y="10" width="180" height="120" fill="none" stroke="#333" stroke-width="1.5"/>
    <rect x="190" y="10" width="60" height="120" fill="#2a9d8f" opacity="0.25"/>
    <rect x="250" y="10" width="60" height="120" fill="#e76f51" opacity="0.25"/>
    <rect x="310" y="10" width="60" height="120" fill="#457b9d" opacity="0.25"/>
    <line x1="250" y1="10" x2="250" y2="130" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
    <line x1="310" y1="10" x2="310" y2="130" stroke="#333" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="220" y="75" text-anchor="middle" font-size="9" fill="#2a9d8f" font-weight="bold">W₀</text>
    <text x="280" y="75" text-anchor="middle" font-size="9" fill="#e76f51" font-weight="bold">W₁</text>
    <text x="340" y="75" text-anchor="middle" font-size="9" fill="#457b9d" font-weight="bold">W₂</text>
    <text x="175" y="75" text-anchor="middle" font-size="9" fill="#666" transform="rotate(-90,175,75)">D</text>
    <text x="280" y="5" text-anchor="middle" font-size="9" fill="#666">D (split into D/3 per chip)</text>
    <text x="280" y="148" text-anchor="middle" font-size="9" fill="#666">[D × D]</text>
    
    <!-- = symbol -->
    <text x="390" y="84" text-anchor="middle" font-size="16" fill="#333">=</text>
    
    <!-- Output Y [B, D] as 3 shards: B rows (short), D/3 columns each -->
    <rect x="410" y="60" width="40" height="40" fill="#2a9d8f" opacity="0.25" stroke="#2a9d8f" stroke-width="1.5"/>
    <text x="430" y="84" text-anchor="middle" font-size="9" fill="#2a9d8f" font-weight="bold">Y₀</text>
    
    <rect x="455" y="60" width="40" height="40" fill="#e76f51" opacity="0.25" stroke="#e76f51" stroke-width="1.5"/>
    <text x="475" y="84" text-anchor="middle" font-size="9" fill="#e76f51" font-weight="bold">Y₁</text>
    
    <rect x="500" y="60" width="40" height="40" fill="#457b9d" opacity="0.25" stroke="#457b9d" stroke-width="1.5"/>
    <text x="520" y="84" text-anchor="middle" font-size="9" fill="#457b9d" font-weight="bold">Y₂</text>
    
    <text x="475" y="115" text-anchor="middle" font-size="9" fill="#666">[B × D/3] each</text>
  </g>
  
  <!-- Step 1: parallel compute -->
  <g transform="translate(50, 230)">
    <text x="300" y="-12" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Step 1: Parallel compute (each chip holds full X, one shard of W)</text>
    
    <!-- Chip 0 -->
    <rect x="0" y="0" width="190" height="75" rx="8" fill="white" stroke="#2a9d8f" stroke-width="2"/>
    <text x="95" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#2a9d8f">Chip 0</text>
    <text x="95" y="36" text-anchor="middle" font-size="9" fill="#333">Y₀ = X [B,D] × W₀ [D, D/3]</text>
    <text x="95" y="52" text-anchor="middle" font-size="9" fill="#888">2·B·D·(D/3) FLOPs</text>
    <text x="95" y="67" text-anchor="middle" font-size="9" fill="#2a9d8f">632 TFLOPS available</text>
    
    <!-- Chip 1 -->
    <g transform="translate(220, 0)">
      <rect x="0" y="0" width="190" height="75" rx="8" fill="white" stroke="#e76f51" stroke-width="2"/>
      <text x="95" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#e76f51">Chip 1</text>
      <text x="95" y="36" text-anchor="middle" font-size="9" fill="#333">Y₁ = X [B,D] × W₁ [D, D/3]</text>
      <text x="95" y="52" text-anchor="middle" font-size="9" fill="#888">2·B·D·(D/3) FLOPs</text>
      <text x="95" y="67" text-anchor="middle" font-size="9" fill="#e76f51">632 TFLOPS available</text>
    </g>
    
    <!-- Chip 2 -->
    <g transform="translate(440, 0)">
      <rect x="0" y="0" width="190" height="75" rx="8" fill="white" stroke="#457b9d" stroke-width="2"/>
      <text x="95" y="18" text-anchor="middle" font-size="10" font-weight="bold" fill="#457b9d">Chip 2</text>
      <text x="95" y="36" text-anchor="middle" font-size="9" fill="#333">Y₂ = X [B,D] × W₂ [D, D/3]</text>
      <text x="95" y="52" text-anchor="middle" font-size="9" fill="#888">2·B·D·(D/3) FLOPs</text>
      <text x="95" y="67" text-anchor="middle" font-size="9" fill="#457b9d">632 TFLOPS available</text>
    </g>
  </g>
  
  <!-- Step 2: All-gather -->
  <g transform="translate(50, 375)">
    <text x="300" y="-12" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Step 2: All-gather (each chip gets the full Y [B, D])</text>
    
    <rect x="0" y="0" width="630" height="60" rx="8" fill="#fff3e0" stroke="#e63946" stroke-width="1.5" stroke-dasharray="4,3"/>
    
    <!-- Arrows between chips -->
    <line x1="95" y1="22" x2="315" y2="22" stroke="#e63946" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="315" y1="22" x2="535" y2="22" stroke="#e63946" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="535" y1="35" x2="315" y2="35" stroke="#e63946" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="315" y1="35" x2="95" y2="35" stroke="#e63946" stroke-width="1.5" marker-end="url(#arr)"/>
    
    <text x="315" y="53" text-anchor="middle" font-size="10" fill="#e63946" font-weight="bold">2·(P−1)/P × B·D × 2 bytes over NeuronLink (1.28 TB/s per chip)</text>
  </g>
  
  <!-- Bottom: the race -->
  <g transform="translate(50, 465)">
    <text x="300" y="-5" text-anchor="middle" font-size="11" fill="#333">TP is efficient when compute time > communication time:</text>
    
    <rect x="30" y="8" width="250" height="35" rx="5" fill="#e8f5e9" stroke="#2a9d8f" stroke-width="1"/>
    <text x="155" y="30" text-anchor="middle" font-size="10" fill="#333">2·B·D·(D/P) / 632 TFLOPS</text>
    
    <text x="300" y="30" text-anchor="middle" font-size="14" fill="#333">></text>
    
    <rect x="320" y="8" width="280" height="35" rx="5" fill="#fce4ec" stroke="#e63946" stroke-width="1"/>
    <text x="460" y="30" text-anchor="middle" font-size="10" fill="#333">2·(P−1)/P · B·D·2 bytes / 1.28 TB/s</text>
  </g>
  
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e63946"/>
    </marker>
  </defs>
</svg>
